<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OG image source — Caffeine Rush</title>
  <style>
    :root {
      --cream: #f5f4f0;
      --ink: #1a1a1a;
      --gray: #6b6b6b;
      --orange: #D85A30;
      --orange-dark: #4A1B0C;
      --purple: #7F77DD;
      --purple-dark: #26215C;
      --border-soft: #c4c2bc;
      --border-quiet: #e5e3dd;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      width: 1200px;
      height: 630px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      grid-template-rows: 630px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 40px 0 80px;
      height: 100%;
    }

    .title {
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      font-weight: 500;
      font-size: 132px;
      line-height: 0.96;
      letter-spacing: -3px;
      margin: 0 0 18px;
      color: var(--ink);
    }

    .tagline {
      font-size: 30px;
      line-height: 1.3;
      color: var(--gray);
      margin: 0;
      letter-spacing: 0.1px;
    }

    .url {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 18px;
      color: var(--gray);
      letter-spacing: 0.08em;
      margin: 110px 0 0;
    }

    .right {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Subtle dot grid in the right pane to echo the game playfield */
    .right::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(127, 119, 221, 0.18) 0.7px, transparent 0.8px);
      background-size: 32px 32px;
      background-position: 16px 16px;
    }

    .scene {
      position: absolute;
      inset: 0;
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="left">
      <h1 class="title">Caffeine<br>Rush</h1>
      <p class="tagline">defend the receptors.<br>don't fall asleep.</p>
    </div>

    <div class="right">
      <svg class="scene" viewBox="0 0 580 630" preserveAspectRatio="xMidYMid meet">
        <!-- Drifting molecules in upper region -->
        <!-- Adenosines (purple) -->
        <g transform="translate(120 110)">
          <circle r="22" fill="#7F77DD"/>
          <path d="M -11 -4.5 Q -6 -1.5 -1.5 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <path d="M 1.5 -4.5 Q 6 -1.5 11 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="0" cy="8" rx="3" ry="2.2" fill="#26215C"/>
        </g>

        <g transform="translate(420 80)">
          <circle r="22" fill="#7F77DD"/>
          <path d="M -11 -4.5 Q -6 -1.5 -1.5 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <path d="M 1.5 -4.5 Q 6 -1.5 11 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="0" cy="8" rx="3" ry="2.2" fill="#26215C"/>
        </g>

        <g transform="translate(280 200)">
          <circle r="22" fill="#7F77DD"/>
          <path d="M -11 -4.5 Q -6 -1.5 -1.5 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <path d="M 1.5 -4.5 Q 6 -1.5 11 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="0" cy="8" rx="3" ry="2.2" fill="#26215C"/>
        </g>

        <!-- Caffeine descending (mid-flight) -->
        <g transform="translate(180 340)">
          <circle r="20" fill="#D85A30"/>
          <circle cx="-6" cy="-3" r="2.4" fill="#4A1B0C"/>
          <circle cx="6" cy="-3" r="2.4" fill="#4A1B0C"/>
          <path d="M -4.5 7.5 Q 0 10.5 4.5 7.5" stroke="#4A1B0C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Three receptors along the bottom -->
        <!-- Receptor 1: empty -->
        <g transform="translate(110 480)">
          <path d="M -33 63 L -33 12 Q -33 0 -21 0 L -18 0 L -18 63 Z" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <path d="M 18 63 L 18 0 L 21 0 Q 33 0 33 12 L 33 63 Z" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <rect x="-33" y="57" width="66" height="6" rx="1.5" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
        </g>

        <!-- Receptor 2: caffeine docked -->
        <g transform="translate(290 480)">
          <path d="M -33 63 L -33 12 Q -33 0 -21 0 L -18 0 L -18 63 Z" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <path d="M 18 63 L 18 0 L 21 0 Q 33 0 33 12 L 33 63 Z" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <rect x="-33" y="57" width="66" height="6" rx="1.5" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <g transform="translate(0 12)">
            <circle r="20" fill="#D85A30"/>
            <circle cx="-6" cy="-3" r="2.4" fill="#4A1B0C"/>
            <circle cx="6" cy="-3" r="2.4" fill="#4A1B0C"/>
            <path d="M -4.5 7.5 Q 0 10.5 4.5 7.5" stroke="#4A1B0C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          </g>
        </g>

        <!-- Receptor 3: adenosine docked -->
        <g transform="translate(470 480)">
          <path d="M -33 63 L -33 12 Q -33 0 -21 0 L -18 0 L -18 63 Z" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <path d="M 18 63 L 18 0 L 21 0 Q 33 0 33 12 L 33 63 Z" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <rect x="-33" y="57" width="66" height="6" rx="1.5" fill="#ffffff" stroke="#c4c2bc" stroke-width="0.8"/>
          <g transform="translate(0 12)">
            <circle r="22" fill="#7F77DD"/>
            <path d="M -11 -4.5 Q -6 -1.5 -1.5 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <path d="M 1.5 -4.5 Q 6 -1.5 11 -4.5" stroke="#26215C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <ellipse cx="0" cy="8" rx="3" ry="2.2" fill="#26215C"/>
          </g>
        </g>

        <!-- Membrane line at receptor base -->
        <line x1="0" y1="565" x2="580" y2="565" stroke="#888780" stroke-width="0.8" opacity="0.4"/>
      </svg>
    </div>
  </div>
</body>
</html>
