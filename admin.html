<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Caffeine Rush — admin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Read-only admin dashboard. Reuses the site's design tokens and editorial
       register so it feels coherent with the public page. No tracking fired
       from this page — just SELECTs against the events table. */
    .admin-wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
    .admin-title { font-family: var(--font-serif); font-size: 28px; font-weight: 500; margin: 0 0 4px; letter-spacing: -0.3px; }
    .admin-sub { color: var(--color-text-secondary); font-size: 14px; margin: 0 0 24px; line-height: 1.55; }
    .admin-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .admin-range-tabs { display: inline-flex; gap: 4px; }
    .admin-range-tabs button {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 10px;
    }
    .admin-range-tabs button.is-active {
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      border-color: var(--color-text-primary);
    }
    .admin-section {
      border: 1px dashed var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      padding: 18px 20px;
      margin-bottom: 18px;
    }
    .admin-section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      opacity: 0.7;
      margin-bottom: 12px;
    }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .admin-table td { padding: 6px 0; border-bottom: 1px solid var(--color-border-tertiary); }
    .admin-table td:last-child { text-align: right; font-family: var(--font-mono); font-weight: 600; color: var(--color-text-primary); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table .indent { padding-left: 18px; color: var(--color-text-secondary); }
    .admin-empty { color: var(--color-text-secondary); font-size: 13px; font-style: italic; padding: 8px 0; }
    .admin-status { color: var(--color-text-secondary); font-size: 12px; font-family: var(--font-mono); }
    .admin-recent { font-family: var(--font-mono); font-size: 12px; line-height: 1.7; color: var(--color-text-secondary); }
    .admin-recent .ev-name { color: var(--color-text-primary); font-weight: 600; }
    .admin-recent .ev-time { opacity: 0.6; }
    .admin-recent .ev-props { opacity: 0.7; }
  </style>
</head>
<body>
  <main class="admin-wrap">
    <h1 class="admin-title">Caffeine Rush — admin</h1>
    <p class="admin-sub">Read-only event counts from the Supabase events table. Page views are tracked separately by Vercel Web Analytics.</p>

    <div class="admin-controls">
      <div class="admin-range-tabs" role="tablist" aria-label="Time range">
        <button type="button" data-range="7d" class="is-active">7 days</button>
        <button type="button" data-range="30d">30 days</button>
        <button type="button" data-range="all">All time</button>
      </div>
      <button type="button" id="admin-refresh">Refresh</button>
      <span class="admin-status" id="admin-status"></span>
    </div>

    <section class="admin-section">
      <div class="admin-section-label">Event totals</div>
      <table class="admin-table" id="admin-totals"></table>
    </section>

    <section class="admin-section">
      <div class="admin-section-label">Friend tile clicks (Friends of Caffeine Rush)</div>
      <table class="admin-table" id="admin-friends"></table>
    </section>

    <section class="admin-section">
      <div class="admin-section-label">Tip clicks (BMC)</div>
      <table class="admin-table" id="admin-tips"></table>
    </section>

    <section class="admin-section">
      <div class="admin-section-label">Share button clicks</div>
      <table class="admin-table" id="admin-shares"></table>
    </section>

    <section class="admin-section">
      <div class="admin-section-label">Recent events (last 50)</div>
      <div class="admin-recent" id="admin-recent"></div>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    const SUPABASE_URL      = 'https://mtlgtastkrnstllshwon.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_I4hUtZIYs0GJ3wY0fpacFg_PhPK6abP';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentRange = '7d';
    const statusEl = document.getElementById('admin-status');

    function rangeStart(range) {
      const now = Date.now();
      if (range === '7d')  return new Date(now - 7  * 24 * 60 * 60 * 1000).toISOString();
      if (range === '30d') return new Date(now - 30 * 24 * 60 * 60 * 1000).toISOString();
      return null; // all time
    }

    function rowsHtml(rows) {
      if (!rows.length) return '<tr><td class="admin-empty" colspan="2">No events in this range.</td></tr>';
      return rows.map(r => `<tr><td>${escapeHtml(r.label)}</td><td>${r.count}</td></tr>`).join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString();
    }

    async function load() {
      statusEl.textContent = 'Loading…';
      const since = rangeStart(currentRange);
      let query = supabase.from('events').select('event_name, props, created_at').order('created_at', { ascending: false }).limit(5000);
      if (since) query = query.gte('created_at', since);
      const { data, error } = await query;
      if (error) { statusEl.textContent = 'Error: ' + error.message; return; }

      const events = data || [];
      statusEl.textContent = events.length + ' events';

      // Aggregate event totals
      const totals = new Map();
      const friends = new Map();
      const tips = new Map();
      const shares = new Map();

      events.forEach(e => {
        totals.set(e.event_name, (totals.get(e.event_name) || 0) + 1);
        if (e.event_name === 'friend_click') {
          const t = (e.props && e.props.target) || 'unknown';
          friends.set(t, (friends.get(t) || 0) + 1);
        } else if (e.event_name === 'tip_click') {
          const a = (e.props && e.props.amount) || 'unknown';
          tips.set(a, (tips.get(a) || 0) + 1);
        } else if (e.event_name === 'share_click') {
          const s = (e.props && e.props.source) || 'unknown';
          shares.set(s, (shares.get(s) || 0) + 1);
        }
      });

      const sortByCount = (a, b) => b[1] - a[1];
      const toRows = m => Array.from(m).sort(sortByCount).map(([label, count]) => ({ label, count }));

      document.getElementById('admin-totals').innerHTML  = rowsHtml(toRows(totals));
      document.getElementById('admin-friends').innerHTML = rowsHtml(toRows(friends));
      document.getElementById('admin-tips').innerHTML    = rowsHtml(toRows(tips));
      document.getElementById('admin-shares').innerHTML  = rowsHtml(toRows(shares));

      // Recent events list (last 50)
      const recent = events.slice(0, 50).map(e => {
        const propsStr = e.props ? '  ' + JSON.stringify(e.props) : '';
        return `<div><span class="ev-time">${formatTime(e.created_at)}</span>  <span class="ev-name">${escapeHtml(e.event_name)}</span><span class="ev-props">${escapeHtml(propsStr)}</span></div>`;
      }).join('');
      document.getElementById('admin-recent').innerHTML = recent || '<div class="admin-empty">No events yet.</div>';
    }

    // Range tab buttons
    document.querySelectorAll('.admin-range-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-range-tabs button').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        currentRange = btn.dataset.range;
        load();
      });
    });

    document.getElementById('admin-refresh').addEventListener('click', load);
    load();
  </script>
</body>
</html>
